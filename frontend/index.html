<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Access Portal | KCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .focus-ring-orange:focus {
            --tw-ring-color: #f97316;
            outline: 2 none;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 md:p-8">
    
    <!-- Loading Overlay -->
    <div id="loadingScreen" class="fixed inset-0 bg-gray-100 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="w-16 h-16 border-4 border-gray-200 border-t-orange-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-gray-600 font-semibold tracking-wide uppercase text-sm">กำลังตรวจสอบสิทธิ์...</p>
    </div>

    <!-- Main Card Container -->
    <div id="mainContainer" class="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden relative" style="display: none;">
        
        <!-- Header Section -->
        <div class="bg-gray-800 p-6 md:p-8 text-white relative">
            <button id="logoutBtn" class="absolute top-6 right-6 text-gray-400 hover:text-orange-400 transition-colors duration-200">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
            <div class="flex items-center space-x-4">
                <div class="bg-orange-500 p-3 rounded-lg">
                    <i class="fas fa-shield-alt text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">ระบบขออนุมัติเข้าใช้งานไฟล์เอกสาร</h1>
                    <p class="text-gray-400 text-sm md:text-base">Document Control Access Request Portal</p>
                </div>
            </div>
        </div>

        <!-- Form Body -->
        <form id="requestForm" class="p-6 md:p-8 space-y-8">
            
            <!-- Section 1: Document Info -->
            <div class="space-y-4">
                <div class="flex items-center space-x-2 text-gray-800 border-b border-gray-100 pb-2">
                    <i class="fas fa-file-invoice text-orange-500"></i>
                    <h2 class="font-bold uppercase text-sm tracking-wider">ข้อมูลเอกสาร</h2>
                </div>
                <div>
                    <label for="document_name" class="block text-sm font-semibold text-gray-700 mb-1">เอกสารที่ต้องการเเก้ไข <span class="text-orange-500">*</span></label>
                    <input type="text" id="document_name" name="document_name" required 
                        placeholder="ระบุชื่อเอกสาร เช่น Document1, Document2"
                        class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-sm transition-all focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none">
                </div>
            </div>

            <!-- Section 2: User Access Details -->
            <div class="space-y-4">
                <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                    <div class="flex items-center space-x-2 text-gray-800">
                        <i class="fas fa-users text-orange-500"></i>
                        <h2 class="font-bold uppercase text-sm tracking-wider">รายละเอียดผู้ขอแก้ไข</h2>
                    </div>
                </div>
                
                <div id="entriesContainer" class="space-y-3">
                    <!-- JavaScript will inject rows here -->
                </div>

                <button type="button" id="addEntryBtn" class="inline-flex items-center px-4 py-2 border-2 border-orange-500 text-orange-600 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-orange-50 hover:border-orange-600 transition-all duration-200">
                    <i class="fas fa-plus-circle mr-2"></i>
                    เพิ่มผู้ใช้งาน (Add IP)
                </button>
            </div>

            <!-- Section 3: Timeline & Email -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                <div class="space-y-4">
                    <div class="flex items-center space-x-2 text-gray-800 border-b border-gray-100 pb-2">
                        <i class="fas fa-calendar-alt text-orange-500"></i>
                        <h2 class="font-bold uppercase text-sm tracking-wider">ระยะเวลา</h2>
                    </div>
                    <div>
                        <label for="expiry" class="block text-sm font-semibold text-gray-700 mb-1">ใช้ถึงวันที่ <span class="text-orange-500">*</span></label>
                        <input type="date" id="expiry" name="expiry" required 
                            class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-sm transition-all focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none">
                        <p class="text-gray-400 text-[10px] mt-1 italic">ระบบจะยกเลิกสิทธิ์อัตโนมัติในเวลา 23:59 น. ของวันที่เลือก</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center space-x-2 text-gray-800 border-b border-gray-100 pb-2">
                        <i class="fas fa-envelope text-orange-500"></i>
                        <h2 class="font-bold uppercase text-sm tracking-wider">อีเมลสำเนา (CC)</h2>
                    </div>
                    <div>
                        <label for="cc_emails" class="block text-sm font-semibold text-gray-700 mb-1">CC To</label>
                        <input type="text" id="cc_emails" name="cc_emails" 
                            placeholder="เช่น manager1@kce.co.th, manager2@kce.co.th"
                            class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-sm transition-all focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none">
                        <p class="text-gray-400 text-[10px] mt-1 italic">ระบุอีเมลหัวหน้าส่วนงาน คั่นด้วยเครื่องหมายจุลภาค (,)</p>
                    </div>
                </div>
            </div>
            
            <!-- Submission -->
            <div class="pt-6 border-t border-gray-100">
                <button type="submit" id="submitBtn"
                    class="w-full bg-orange-500 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-orange-500/30 hover:bg-orange-600 hover:shadow-orange-600/40 active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2 disabled:bg-gray-300 disabled:shadow-none disabled:cursor-not-allowed">
                    <span>ส่งคำขอใช้งาน (Submit Request)</span>
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </form>
        
        <!-- Status Notification Box -->
        <div id="statusMessage" class="mx-6 md:mx-8 mb-8 p-4 rounded-xl text-sm border flex items-start space-x-3 hidden transition-all duration-300">
            <div id="statusIcon" class="mt-0.5"></div>
            <div id="statusText"></div>
        </div>
    </div>

    <script src="script.js?v=1.0.2"></script>
</body>
</html>
