services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      - PORT=5050
      - COOKIE_SECURE=false
      - ALLOWED_ORIGIN=http://localhost:5050
      - CLEANUP_API_KEY=test-key-123
      - CLEANUP_GRACE_DAYS=2
    # No public port exposure for backend when using NPM
    # But mapped to 127.0.0.1:5051 for internal testing if needed
    ports:
      - "127.0.0.1:5051:5050"
    networks:
      - firewall_network

  frontend:
    image: nginx:alpine
    ports:
      - "5050:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - firewall_network

networks:
  firewall_network:
    driver: bridge
